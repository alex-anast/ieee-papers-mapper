site_name: IEEE Papers Mapper

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

repo_url: https://github.com/alex-anast/ieee-papers-mapper
# site_url: https://alex-anast.github.io/ieee-papers-mapper

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables

nav:
  - Home: index.md
  - User Guide:
      - Overview: user_guide/overview.md
      - Installation: user_guide/installation.md
      - Usage: user_guide/usage.md
      - Observability: user_guide/observability.md
  - Developer Guide:
      - Code Structure: developer_guide/code_structure.md
      - Testing Runbook: developer_guide/testing_runbook.md
      - API Reference: developer_guide/api_reference.md
  - About: about.md
