services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    volumes:
      - app-data:/data
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pipeline:
    build: .
    restart: unless-stopped
    command: ["ieee-papers", "run", "--hours", "24"]
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    volumes:
      - app-data:/data
      - huggingface-cache:/root/.cache/huggingface
    depends_on:
      dashboard:
        condition: service_healthy

volumes:
  app-data:
  huggingface-cache:
